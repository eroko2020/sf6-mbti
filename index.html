<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STREET FIGHTER 6 | 人格診斷</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --sf6-orange: #FF5F00;
  --sf6-orange-dark: #CC4C00;
  --sf6-yellow: #FFD700;
  --sf6-blue: #00A8E8;
  --sf6-dark: #0a0a0a;
  --sf6-darker: #050505;
  --sf6-gray: #1a1a1a;
  --sf6-gray-light: #2a2a2a;
  --sf6-white: #f0f0f0;
  --sf6-red: #E02020;
  --sf6-green: #20C040;
  --font-display: 'Barlow Condensed', 'Noto Sans TC', sans-serif;
  --font-body: 'Noto Sans TC', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--sf6-darker);
  color: var(--sf6-white);
  font-family: var(--font-body);
  overflow-x: hidden;
  min-height: 100vh;
}

/* ===== NAVIGATION BAR ===== */
.sf6-nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  height: 56px;
  background: rgba(5,5,5,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 2px solid var(--sf6-orange);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
}
.sf6-nav .logo {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 900;
  color: var(--sf6-orange);
  letter-spacing: 3px;
  text-transform: uppercase;
}
.sf6-nav .logo span { color: var(--sf6-white); }
.sf6-nav .nav-links {
  display: flex;
  gap: 28px;
}
.sf6-nav .nav-links a {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 600;
  color: var(--sf6-white);
  text-decoration: none;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: color 0.2s;
}
.sf6-nav .nav-links a:hover, .sf6-nav .nav-links a.active { color: var(--sf6-orange); }

/* ===== HERO SECTION ===== */
.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 100px 24px 80px;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at center, rgba(255,95,0,0.08) 0%, transparent 70%);
  z-index: 0;
}
.hero .hero-tag {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 6px;
  color: var(--sf6-orange);
  text-transform: uppercase;
  margin-bottom: 20px;
  position: relative;
  z-index: 1;
}
.hero h1 {
  font-family: var(--font-display);
  font-size: clamp(48px, 10vw, 120px);
  font-weight: 900;
  line-height: 0.9;
  text-transform: uppercase;
  letter-spacing: 4px;
  position: relative;
  z-index: 1;
}
.hero h1 .line1 { display: block; color: var(--sf6-white); }
.hero h1 .line2 {
  display: block;
  color: var(--sf6-orange);
  text-shadow: 4px 4px 0 rgba(0,0,0,0.5), -2px -2px 0 rgba(0,0,0,0.3);
}
.hero .hero-sub {
  font-size: 16px;
  color: #999;
  margin-top: 24px;
  max-width: 500px;
  line-height: 1.7;
  position: relative;
  z-index: 1;
}
.hero .hero-btn {
  display: inline-block;
  margin-top: 40px;
  padding: 16px 48px;
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--sf6-white);
  background: var(--sf6-orange);
  border: none;
  clip-path: polygon(12px 0, 100% 0, calc(100% - 12px) 100%, 0 100%);
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  z-index: 1;
}
.hero .hero-btn:hover {
  background: #FF7F2A;
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(255,95,0,0.4);
}

/* ===== CHARACTER SELECT GRID ===== */
.char-grid-section {
  padding: 40px 24px 80px;
  max-width: 1200px;
  margin: 0 auto;
}
.char-grid-title {
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 900;
  letter-spacing: 4px;
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 8px;
  color: var(--sf6-white);
}
.char-grid-sub {
  text-align: center;
  color: #777;
  font-size: 14px;
  margin-bottom: 40px;
}
.char-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 4px;
}
.char-card {
  position: relative;
  aspect-ratio: 3/4;
  overflow: hidden;
  clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
  cursor: pointer;
  transition: transform 0.3s, box-shadow 0.3s;
  background: var(--sf6-gray);
  border: 1px solid #222;
}
.char-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 32px rgba(255,95,0,0.3);
  z-index: 10;
}
.char-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top center;
  transition: transform 0.4s;
}
.char-card:hover img { transform: scale(1.05); }
.char-card .char-label {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 12px 8px;
  background: linear-gradient(transparent, rgba(0,0,0,0.9));
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--sf6-white);
  text-align: center;
}
.char-card .char-cn {
  font-size: 11px;
  font-weight: 400;
  color: #999;
  display: block;
  margin-top: 2px;
}

/* ===== TEST INTERFACE ===== */
.test-section {
  display: none;
  min-height: 100vh;
  padding: 100px 24px 80px;
  max-width: 800px;
  margin: 0 auto;
}
.test-section.active { display: block; }

.test-header {
  text-align: center;
  margin-bottom: 40px;
}
.test-header .dim-label {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 6px;
  color: var(--sf6-orange);
  text-transform: uppercase;
}
.test-header h2 {
  font-family: var(--font-display);
  font-size: 48px;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin: 8px 0;
}

/* HUD Progress Bar */
.hud-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 32px;
  padding: 0 8px;
}
.hud-bar .hud-label {
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  color: #888;
  text-transform: uppercase;
  white-space: nowrap;
}
.hud-bar .hud-track {
  flex: 1;
  height: 8px;
  background: #1a1a1a;
  border: 1px solid #333;
  clip-path: polygon(4px 0, 100% 0, calc(100% - 4px) 100%, 0 100%);
  overflow: hidden;
}
.hud-bar .hud-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--sf6-green), #40E060);
  transition: width 0.5s ease;
  clip-path: polygon(4px 0, 100% 0, calc(100% - 4px) 100%, 0 100%);
}

/* Dimension Tabs */
.dim-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 32px;
  flex-wrap: wrap;
  justify-content: center;
}
.dim-tab {
  padding: 8px 20px;
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #666;
  background: transparent;
  border: 1px solid #333;
  clip-path: polygon(6px 0, 100% 0, calc(100% - 6px) 100%, 0 100%);
  cursor: pointer;
  transition: all 0.3s;
  white-space: nowrap;
}
.dim-tab:hover { color: #aaa; border-color: #555; }
.dim-tab.active {
  color: var(--sf6-white);
  background: var(--sf6-orange);
  border-color: var(--sf6-orange);
}

/* Questions */
.question-block {
  margin-bottom: 32px;
  padding: 24px;
  background: var(--sf6-gray);
  clip-path: polygon(12px 0, 100% 0, calc(100% - 12px) 100%, 0 100%);
  border: 1px solid #222;
}
.question-block .q-num {
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--sf6-orange);
  margin-bottom: 12px;
}
.question-block .q-text {
  font-size: 17px;
  font-weight: 500;
  line-height: 1.6;
  color: var(--sf6-white);
  margin-bottom: 20px;
}
.options {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.option-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  background: var(--sf6-dark);
  border: 1px solid #2a2a2a;
  clip-path: polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%);
  cursor: pointer;
  transition: all 0.25s;
  text-align: left;
  font-family: var(--font-body);
  font-size: 15px;
  color: #ccc;
}
.option-btn:hover {
  border-color: var(--sf6-orange);
  color: var(--sf6-white);
  background: #111;
}
.option-btn.selected {
  border-color: var(--sf6-orange);
  background: rgba(255,95,0,0.12);
  color: var(--sf6-white);
}
.option-btn .opt-marker {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 900;
  color: #444;
  background: #111;
  clip-path: polygon(6px 0, 100% 0, calc(100% - 6px) 100%, 0 100%);
  flex-shrink: 0;
  transition: all 0.25s;
}
.option-btn.selected .opt-marker {
  color: var(--sf6-orange);
  background: rgba(255,95,0,0.2);
}

.continue-btn {
  display: block;
  width: 100%;
  max-width: 300px;
  margin: 40px auto 0;
  padding: 16px;
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--sf6-white);
  background: var(--sf6-orange);
  border: none;
  clip-path: polygon(12px 0, 100% 0, calc(100% - 12px) 100%, 0 100%);
  cursor: pointer;
  transition: all 0.3s;
}
.continue-btn:hover:not(:disabled) {
  background: #FF7F2A;
  box-shadow: 0 8px 24px rgba(255,95,0,0.4);
}
.continue-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

/* ===== RESULT SECTION ===== */
.result-section {
  display: none;
  min-height: 100vh;
}
.result-section.active { display: block; }

.result-hero {
  display: flex;
  min-height: 100vh;
  position: relative;
  overflow: hidden;
}
.result-left {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 80px 40px 80px 60px;
  z-index: 2;
}
.result-right {
  flex: 1.2;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.result-right img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center bottom;
  animation: charSlideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  filter: drop-shadow(0 0 40px rgba(0,0,0,0.5));
}
@keyframes charSlideIn {
  from { opacity: 0; transform: translateX(60px) scale(0.9); }
  to { opacity: 1; transform: translateX(0) scale(1); }
}
.result-right::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 30%;
  background: linear-gradient(transparent, var(--sf6-darker));
  pointer-events: none;
}

.result-mbti {
  font-family: var(--font-display);
  font-size: clamp(64px, 12vw, 140px);
  font-weight: 900;
  line-height: 0.85;
  letter-spacing: 2px;
  color: var(--sf6-white);
  text-shadow: 6px 6px 0 var(--sf6-orange);
  margin-bottom: 8px;
}
.result-name {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--sf6-orange);
  margin-bottom: 6px;
}
.result-cn {
  font-size: 18px;
  color: #999;
  margin-bottom: 24px;
}

/* Status Bars */
.status-bars { margin-bottom: 32px; }
.status-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.status-label {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  color: #888;
  width: 70px;
  text-align: right;
}
.status-track {
  flex: 1;
  height: 6px;
  background: #1a1a1a;
  border: 1px solid #333;
  clip-path: polygon(4px 0, 100% 0, calc(100% - 4px) 100%, 0 100%);
  overflow: hidden;
}
.status-fill {
  height: 100%;
  transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1);
}
.status-fill.hp { background: linear-gradient(90deg, #20C040, #40E060); }
.status-fill.drive { background: linear-gradient(90deg, #FF5F00, #FF8F3F); }
.status-fill.super { background: linear-gradient(90deg, #00A8E8, #40C8FF); }

/* Dimension Analysis */
.dim-analysis { margin-bottom: 28px; }
.dim-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
  font-size: 13px;
}
.dim-pair {
  font-family: var(--font-display);
  font-weight: 700;
  letter-spacing: 1px;
  width: 50px;
  text-align: center;
  font-size: 14px;
}
.dim-pair.left { color: #ccc; text-align: right; }
.dim-pair.right { color: #ccc; text-align: left; }
.dim-bar-outer {
  flex: 1;
  height: 18px;
  background: #111;
  border: 1px solid #222;
  clip-path: polygon(6px 0, 100% 0, calc(100% - 6px) 100%, 0 100%);
  overflow: hidden;
  display: flex;
}
.dim-bar-inner {
  height: 100%;
  transition: width 0.8s ease;
}
.dim-bar-inner.left { background: var(--sf6-orange); }
.dim-bar-inner.right { background: var(--sf6-blue); margin-left: auto; }

/* Description */
.result-desc {
  font-size: 15px;
  line-height: 1.8;
  color: #bbb;
  margin-bottom: 20px;
}
.result-traits {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}
.trait-tag {
  padding: 6px 14px;
  font-size: 12px;
  border: 1px solid #333;
  clip-path: polygon(6px 0, 100% 0, calc(100% - 6px) 100%, 0 100%);
  color: #aaa;
}

/* Compatible characters */
.compat-section { margin-bottom: 24px; }
.compat-title {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 3px;
  color: #888;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.compat-chars {
  display: flex;
  gap: 8px;
}
.compat-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  background: #111;
  border: 1px solid #2a2a2a;
  clip-path: polygon(6px 0, 100% 0, calc(100% - 6px) 100%, 0 100%);
}
.compat-chip img {
  width: 32px;
  height: 32px;
  object-fit: cover;
  object-position: top;
  clip-path: polygon(4px 0, 100% 0, calc(100% - 4px) 100%, 0 100%);
}
.compat-chip span {
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* Action buttons */
.result-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.r-btn {
  padding: 12px 28px;
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.3s;
}
.r-btn.primary {
  color: var(--sf6-white);
  background: var(--sf6-orange);
  border: none;
  clip-path: polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%);
}
.r-btn.primary:hover { background: #FF7F2A; }
.r-btn.secondary {
  color: #ccc;
  background: transparent;
  border: 1px solid #444;
  clip-path: polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%);
}
.r-btn.secondary:hover { border-color: var(--sf6-orange); color: var(--sf6-orange); }

/* ===== FOOTER ===== */
.sf6-footer {
  text-align: center;
  padding: 24px;
  border-top: 1px solid #1a1a1a;
  color: #444;
  font-size: 12px;
  letter-spacing: 1px;
}

/* ===== ANIMATIONS ===== */
.fade-in {
  animation: fadeIn 0.5s ease forwards;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .result-hero { flex-direction: column; }
  .result-left { padding: 40px 20px; order: 2; }
  .result-right { flex: none; height: 50vh; order: 1; }
  .result-mbti { font-size: clamp(40px, 16vw, 100px); }
  .sf6-nav { padding: 0 12px; }
  .sf6-nav .nav-links { display: none; }
  .char-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
  .test-section { padding: 90px 16px 40px; }
  .dim-tabs { gap: 4px; }
  .dim-tab { padding: 6px 12px; font-size: 12px; letter-spacing: 1px; }
  .option-btn { padding: 12px 14px; font-size: 14px; }
}
</style>
</head>
<body>

<!-- NAVIGATION -->
<nav class="sf6-nav">
  <div class="logo">SF<span>6</span></div>
  <div class="nav-links">
    <a href="#" class="active" data-nav="home">HOME</a>
    <a href="#" data-nav="test">TEST</a>
    <a href="#" data-nav="characters">CHARACTERS</a>
  </div>
</nav>

<!-- HERO / HOME -->
<section class="hero" id="home-section">
  <div class="hero-tag">PERSONALITY DIAGNOSIS</div>
  <h1>
    <span class="line1">WHAT'S YOUR</span>
    <span class="line2">FIGHTING STYLE?</span>
  </h1>
  <p class="hero-sub">
    透過 20 道情境式問答，找出你在《Street Fighter 6》中最匹配的格鬥家。每個選擇，都揭示你內心深處的戰鬥本能。
  </p>
  <button class="hero-btn" onclick="startTest()">START TEST</button>
</section>

<!-- CHARACTER GRID -->
<section class="char-grid-section" id="characters-section">
  <div class="char-grid-title">CHARACTER SELECT</div>
  <div class="char-grid-sub">點擊角色檢視其 MBTI 對應</div>
  <div class="char-grid" id="charGrid"></div>
</section>

<!-- TEST SECTION -->
<section class="test-section" id="test-section">
  <div class="test-header">
    <div class="dim-label" id="dimLabel">DIMENSION 1/4</div>
    <h2 id="dimTitle">ENERGY</h2>
  </div>
  <div class="hud-bar">
    <span class="hud-label">PROGRESS</span>
    <div class="hud-track"><div class="hud-fill" id="hudFill" style="width:0%"></div></div>
    <span style="font-family:var(--font-display);font-size:12px;font-weight:700;color:#888" id="hudPercent">0/20</span>
  </div>
  <div class="dim-tabs" id="dimTabs"></div>
  <div id="questionContainer"></div>
  <button class="continue-btn" id="continueBtn" disabled onclick="nextQuestion()">NEXT</button>
</section>

<!-- RESULT SECTION -->
<section class="result-section" id="result-section">
  <div class="result-hero" id="resultHero">
    <div class="result-left" id="resultLeft"></div>
    <div class="result-right" id="resultRight"></div>
  </div>
  <div class="sf6-footer">©CAPCOM  STREET FIGHTER 6  PERSONALITY DIAGNOSIS</div>
</section>

<script>
// ==================== DATA ====================

// Character data with MBTI mapping and theme colors
const CHARACTERS = {

// ==================== STATE ====================
let currentDim = 0;
let currentQ = 0;
let answers = {}; // key: question index, value: 'E'/'I' etc.
const dimNames = ['ENERGY','NATURE','TACTICS','IDENTITY'];
const dimPairs = [['E','I'],['S','N'],['T','F'],['J','P']];
const dimLabels = ['外向 Extraversion / 內向 Introversion','實感 Sensing / 直覺 Intuition','思考 Thinking / 情感 Feeling','判斷 Judging / 感知 Perceiving'];

// ==================== INIT ====================
function init() {
  buildCharGrid();
}

function buildCharGrid() {
  const grid = document.getElementById('charGrid');
  const entries = Object.entries(CHARACTERS);
  grid.innerHTML = entries.map(([mbti, ch]) => `
    <div class="char-card" onclick="alert('${ch.en} - ${mbti}\\n${ch.cn}')" style="background:${ch.color}10">
      <img src="sf6-chars/${ch.id}.png" alt="${ch.en}" loading="lazy" onerror="this.style.display='none'">
      <div class="char-label">${ch.en}<span class="char-cn">${ch.cn} · ${mbti}</span></div>
    </div>
  `).join('');
}

// ==================== TEST FLOW ====================
function startTest() {
  document.getElementById('home-section').style.display = 'none';
  document.getElementById('characters-section').style.display = 'none';
  document.getElementById('result-section').classList.remove('active');
  document.getElementById('test-section').classList.add('active');
  currentDim = 0;
  currentQ = 0;
  answers = {};
  buildDimTabs();
  renderQuestion();
  updateHUD();
}

function buildDimTabs() {
  const container = document.getElementById('dimTabs');
  container.innerHTML = dimNames.map((name, i) => `
    <button class="dim-tab ${i === currentDim ? 'active' : ''}" onclick="switchDim(${i})">${name}</button>
  `).join('');
}

function switchDim(dimIndex) {
  // Only allow switching to completed dimensions or the current one
  const dimStart = dimIndex * 5;
  const allAnswered = QUESTIONS.slice(dimStart, dimStart + 5).every((_, i) => answers[dimStart + i] !== undefined);
  if (dimIndex <= currentDim || allAnswered) {
    currentDim = dimIndex;
    currentQ = dimStart;
    buildDimTabs();
    renderQuestion();
    updateHUD();
  }
}

function renderQuestion() {
  const container = document.getElementById('questionContainer');
  const q = QUESTIONS[currentQ];
  document.getElementById('dimLabel').textContent = `DIMENSION ${currentDim + 1}/4`;
  document.getElementById('dimTitle').textContent = dimNames[currentDim];

  container.innerHTML = `
    <div class="question-block fade-in">
      <div class="q-num">Q${currentQ + 1} · ${dimNames[currentDim]}</div>
      <div class="q-text">${q.text}</div>
      <div class="options">
        ${q.opts.map((opt, oi) => `
          <button class="option-btn ${answers[currentQ] === opt.score ? 'selected' : ''}" onclick="selectAnswer('${opt.score}', this)">
            <span class="opt-marker">${String.fromCharCode(65 + oi)}</span>
            ${opt.text}
          </button>
        `).join('')}
      </div>
    </div>
  `;

  document.getElementById('continueBtn').disabled = answers[currentQ] === undefined;
}

function selectAnswer(score, btn) {
  answers[currentQ] = score;
  document.getElementById('continueBtn').disabled = false;
  // Update button styles
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function nextQuestion() {
  if (currentQ < 19) {
    currentQ++;
    // Update currentDim
    currentDim = Math.floor(currentQ / 5);
    buildDimTabs();
    renderQuestion();
    updateHUD();
  } else {
    // Test complete
    showResult();
  }
}

function updateHUD() {
  const answered = Object.keys(answers).length;
  const pct = (answered / 20) * 100;
  document.getElementById('hudFill').style.width = pct + '%';
  document.getElementById('hudPercent').textContent = answered + '/20';
}

// ==================== RESULT ====================
function showResult() {
  document.getElementById('test-section').classList.remove('active');
  document.getElementById('home-section').style.display = 'none';
  document.getElementById('characters-section').style.display = 'none';

  // Calculate MBTI
  const mbti = dimPairs.map((pair, i) => {
    let scoreA = 0, scoreB = 0;
    for (let j = 0; j < 5; j++) {
      const ans = answers[i * 5 + j];
      if (ans === pair[0]) scoreA++;
      else if (ans === pair[1]) scoreB++;
    }
    return { letter: scoreA >= scoreB ? pair[0] : pair[1], pct: scoreA >= scoreB ? (scoreA / 5 * 100) : (scoreB / 5 * 100), flipped: scoreB > scoreA };
  });

  const mbtiStr = mbti.map(d => d.letter).join('');
  const ch = CHARACTERS[mbtiStr];
  const compatChars = COMPAT[mbtiStr];

  // Status bar percentages (based on personality traits)
  const hpPct = Math.round(60 + (mbti[2].pct * 0.3) + (mbti[0].pct * 0.1));
  const drivePct = Math.round(50 + (mbti[1].pct * 0.35) + (mbti[3].pct * 0.15));
  const superPct = Math.round(40 + (mbti[1].pct * 0.4) + (mbti[2].pct * 0.2));

  // Build result left
  const leftEl = document.getElementById('resultLeft');
  leftEl.innerHTML = `
    <div class="result-mbti">${mbtiStr}</div>
    <div class="result-name">${ch.en}</div>
    <div class="result-cn">${ch.cn}</div>
    <div class="status-bars">
      <div class="status-row">
        <span class="status-label">HP</span>
        <div class="status-track"><div class="status-fill hp" style="width:${hpPct}%"></div></div>
        <span style="font-family:var(--font-display);font-size:11px;color:#888;width:36px">${hpPct}%</span>
      </div>
      <div class="status-row">
        <span class="status-label">DRIVE</span>
        <div class="status-track"><div class="status-fill drive" style="width:${drivePct}%"></div></div>
        <span style="font-family:var(--font-display);font-size:11px;color:#888;width:36px">${drivePct}%</span>
      </div>
      <div class="status-row">
        <span class="status-label">SUPER</span>
        <div class="status-track"><div class="status-fill super" style="width:${superPct}%"></div></div>
        <span style="font-family:var(--font-display);font-size:11px;color:#888;width:36px">${superPct}%</span>
      </div>
    </div>
    <div class="dim-analysis">
      ${mbti.map((d, i) => {
        const pair = dimPairs[i];
        const names = [['外向','內向'],['實感','直覺'],['思考','情感'],['判斷','感知']];
        return `
          <div class="dim-row">
            <span class="dim-pair left">${pair[0]}</span>
            <div class="dim-bar-outer">
              <div class="dim-bar-inner ${d.flipped ? 'right' : 'left'}" style="width:${d.flipped ? 100 - d.pct : d.pct}%"></div>
            </div>
            <span class="dim-pair right">${pair[1]}</span>
          </div>
        `;
      }).join('')}
    </div>
    <p class="result-desc">${ch.desc}</p>
    <div class="result-traits">
      ${ch.traits.map(t => `<span class="trait-tag">${t}</span>`).join('')}
    </div>
    <div class="compat-section">
      <div class="compat-title">最佳搭檔</div>
      <div class="compat-chars">
        ${compatChars.map(cid => {
          const cobj = Object.values(CHARACTERS).find(c => c.id === cid);
          return cobj ? `<div class="compat-chip"><img src="sf6-chars/${cid}.png" alt="${cobj.en}" onerror="this.style.display='none'"><span>${cobj.en}</span></div>` : '';
        }).join('')}
      </div>
    </div>
    <div style="margin-top:8px; font-size:13px; color:#888">
      <p><strong style="color:var(--sf6-green)">優勢：</strong>${ch.strong}</p>
      <p style="margin-top:4px"><strong style="color:var(--sf6-orange)">成長：</strong>${ch.grow}</p>
    </div>
    <div class="result-actions" style="margin-top:24px">
      <button class="r-btn primary" onclick="shareResult('${mbtiStr}')">分享結果</button>
      <button class="r-btn secondary" onclick="retakeTest()">重新測試</button>
    </div>
  `;

  // Build result right (character art)
  const rightEl = document.getElementById('resultRight');
  rightEl.innerHTML = `<img src="sf6-chars/${ch.id}.png" alt="${ch.en}" onerror="this.src='data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 width=%27400%27 height=%27600%27><rect fill=%27%23${ch.color.replace("#","")}30%27 width=%27400%27 height=%27600%27/></svg>'">`;
  rightEl.style.background = `radial-gradient(ellipse at center, ${ch.color}15 0%, transparent 70%)`;

  document.getElementById('result-section').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });

  // Delayed status bar animation
  setTimeout(() => {
    document.querySelectorAll('.status-fill').forEach(el => {
      el.style.width = el.style.width; // force reflow
    });
  }, 100);
}

function shareResult(mbtiStr) {
  const ch = CHARACTERS[mbtiStr];
  const text = `🕹️ STREET FIGHTER 6 人格診斷\n\n我的格鬥人格：${mbtiStr}\n對應角色：${ch.en}（${ch.cn}）\n\n${ch.desc}\n\n快來測試你的格鬥人格！`;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => alert('已複製結果到剪貼簿！'));
  } else {
    prompt('複製以下文字分享：', text);
  }
}

function retakeTest() {
  document.getElementById('result-section').classList.remove('active');
  document.getElementById('home-section').style.display = 'flex';
  document.getElementById('characters-section').style.display = 'block';
  answers = {};
  currentDim = 0;
  currentQ = 0;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ==================== NAVIGATION ====================
document.querySelectorAll('.sf6-nav a').forEach(link => {
  link.addEventListener('click', (e) => {
    e.preventDefault();
    const nav = link.dataset.nav;
    document.querySelectorAll('.sf6-nav a').forEach(l => l.classList.remove('active'));
    link.classList.add('active');
    if (nav === 'home') {
      document.getElementById('home-section').style.display = 'flex';
      document.getElementById('characters-section').style.display = 'block';
      document.getElementById('test-section').classList.remove('active');
      document.getElementById('result-section').classList.remove('active');
    } else if (nav === 'characters') {
      document.getElementById('home-section').style.display = 'none';
      document.getElementById('characters-section').style.display = 'block';
      document.getElementById('test-section').classList.remove('active');
      document.getElementById('result-section').classList.remove('active');
    } else if (nav === 'test') {
      startTest();
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
});

// Initialize
init();
</script>
</body>
</html>
